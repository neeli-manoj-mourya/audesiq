<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Audesiq logo">
  <!-- background rounded square -->
  <rect x="0" y="0" width="120" height="120" rx="20" fill="#5B4DFF"/>
  <!-- group for internal shapes -->
  <g transform="translate(18,18)">
    <!-- play triangle -->
    <path d="M8 6v48l40-24L8 6z" fill="#FFFFFF"/>
    <!-- sound-wave bars -->
    <rect x="54" y="6" width="4" height="36" rx="2" fill="#FFD400"/>
    <rect x="66" y="12" width="4" height="28" rx="2" fill="#FFFFFF"/>
    <rect x="78" y="18" width="4" height="16" rx="2" fill="#FFFFFF"/>
    <!-- subtitle lines -->
    <rect x="0" y="56" width="40" height="4" rx="2" fill="#FFFFFF" opacity="0.95"/>
    <rect x="0" y="66" width="26" height="4" rx="2" fill="#FFFFFF" opacity="0.7"/>
  </g>
</svg>


  <!-- Drop shadow layer (offset purple rect behind icon) -->
  <rect x="4" y="8" width="112" height="112" rx="26" fill="#4A3FE6" opacity="0.6"/>

  <!-- Main rounded square purple background with darker border -->
  <rect x="0" y="0" width="112" height="112" rx="26" fill="#5B4DFF"/>
  <rect x="0" y="0" width="112" height="112" rx="26" fill="none" stroke="#4A3FE6" stroke-width="2.5"/>

  <!-- White circle -->
  <circle cx="56" cy="36" r="21" fill="#FFFFFF"/>

  <!-- Play triangle — outline stroke, purple -->
  <path d="M50 28 L50 44 L65 36 Z" fill="none" stroke="#5B4DFF" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- 5 vertical equalizer bars inside icon (bell-curve: short, mid, tall, mid, short) -->
  <rect x="22" y="74" width="7" height="9"  rx="3.5" fill="#FFFFFF" opacity="0.6"/>
  <rect x="33" y="67" width="7" height="16" rx="3.5" fill="#FFFFFF" opacity="0.75"/>
  <rect x="44" y="62" width="7" height="21" rx="3.5" fill="#FFFFFF" opacity="0.9"/>
  <rect x="55" y="67" width="7" height="16" rx="3.5" fill="#FFFFFF" opacity="0.75"/>
  <rect x="66" y="74" width="7" height="9"  rx="3.5" fill="#FFFFFF" opacity="0.6"/>

  <!-- 3 horizontal lines BELOW the icon (outside the rounded square) -->
  <rect x="0"  y="122" width="112" height="5" rx="2.5" fill="#EDEBFF" opacity="0.9"/>
  <rect x="0"  y="133" width="80"  height="5" rx="2.5" fill="#EDEBFF" opacity="0.7"/>
  <rect x="0"  y="144" width="56"  height="5" rx="2.5" fill="#EDEBFF" opacity="0.5"/>

</svg>
